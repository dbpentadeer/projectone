<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask 控制中心 (MyProject)</title>
    <!-- Google Fonts Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.35);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
            --success-bg: rgba(16, 185, 129, 0.1);
            --error-bg: rgba(239, 68, 68, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px 20px;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        nav {
            width: 100%;
            padding: 20px 40px;
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links a.active {
            color: #fff;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }


        .container {
            width: 100%;
            max-width: 580px;
            perspective: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        .subtitle code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: #a5b4fc;
        }

        /* Glassmorphism Card styling */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Result container styling */
        .result-box {
            margin-top: 25px;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 0.95rem;
            display: none;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .result-box.show {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .result-box.success {
            background-color: var(--success-bg);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .result-box.error {
            background-color: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        /* Status indicator badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-top: 10px;
            animation: fadeIn 1s ease both 0.5s;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-ring 1.8s infinite;
        }

        /* Footer styling */
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            animation: fadeIn 1.2s ease both 0.3s;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        /* Spinner animation for button */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Shared Navigation -->
    <nav>
        <a href="/" class="nav-logo">Dashboard Center</a>
        <div class="nav-links">
            <a href="/" class="active">首頁 API</a>
            <a href="/feature1">☀️ 早上看股票</a>
            <a href="/feature2">💻 下午上班公司</a>
        </div>
    </nav>

    <div class="container">

        <header>
            <h1>Python Flask API Dashboard</h1>
            <div class="subtitle">已成功部署於本機連接埠 <code>19191</code></div>
            <div class="status-badge">
                <span class="pulse"></span>
                <span>系統運行中 (Active)</span>
            </div>
        </header>

        <main class="card">
            <form id="greetForm">
                <div class="form-group">
                    <label for="nameInput">您的姓名 (Name)</label>
                    <div class="input-wrapper">
                        <input type="text" id="nameInput" placeholder="請輸入姓名，例如: Antigravity..." autocomplete="off">
                    </div>
                </div>
                
                <button type="submit" id="submitBtn">
                    <span class="spinner" id="btnSpinner"></span>
                    <span id="btnText">傳送名稱並清洗</span>
                </button>
            </form>

            <div id="resultBox" class="result-box">
                <span class="icon" id="resultIcon">✨</span>
                <span id="resultMsg"></span>
            </div>
        </main>

        <footer>
            &copy; 2026 MyProject. Powered by Flask & Premium Minimalist Design.
        </footer>
    </div>

    <script>
        const greetForm = document.getElementById('greetForm');
        const nameInput = document.getElementById('nameInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const resultBox = document.getElementById('resultBox');
        const resultIcon = document.getElementById('resultIcon');
        const resultMsg = document.getElementById('resultMsg');

        greetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Set loading state
            btnSpinner.style.display = 'block';
            btnText.innerText = '處理中...';
            submitBtn.disabled = true;
            
            // Clear previous result styling
            resultBox.className = 'result-box';
            resultBox.style.display = 'none';

            const name = nameInput.value;

            try {
                // Call POST /api/greet
                const response = await fetch('/api/greet', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name: name })
                });

                const resData = await response.json();

                // Wait briefly for a smooth transition
                await new Promise(resolve => setTimeout(resolve, 350));

                if (response.ok && resData.success) {
                    resultBox.classList.add('success', 'show');
                    resultBox.style.display = 'flex';
                    resultIcon.innerText = '✨';
                    resultMsg.innerText = resData.message;
                } else {
                    resultBox.classList.add('error', 'show');
                    resultBox.style.display = 'flex';
                    resultIcon.innerText = '⚠️';
                    resultMsg.innerText = resData.message || '伺服器回傳錯誤';
                }
            } catch (err) {
                console.error(err);
                resultBox.classList.add('error', 'show');
                resultBox.style.display = 'flex';
                resultIcon.innerText = '📡';
                resultMsg.innerText = '連線失敗，無法存取 API 伺服器';
            } finally {
                // Reset button state
                btnSpinner.style.display = 'none';
                btnText.innerText = '傳送名稱並清洗';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
